<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pèse-moi — Connexion</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0f11;
    --surface: #16181c;
    --surface2: #1e2126;
    --border: #2a2d35;
    --accent: #c8f060;
    --danger: #f06080;
    --text: #e8e9eb;
    --muted: #6b7280;
    --font-display: 'DM Serif Display', serif;
    --font-mono: 'DM Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background-image:
      radial-gradient(ellipse at 20% 0%, #1a2a0a 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, #0a1a2a 0%, transparent 50%);
  }

  .container {
    width: 100%;
    max-width: 420px;
  }

  .logo {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .logo h1 {
    font-family: var(--font-display);
    font-style: italic;
    font-size: 3rem;
    color: var(--accent);
  }

  .logo p {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--muted);
    margin-top: 0.25rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
  }

  .tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem;
    margin-bottom: 2rem;
  }

  .tab {
    padding: 0.6rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: none;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab.active {
    background: var(--surface2);
    border-color: var(--accent);
    color: var(--accent);
  }

  .form { display: flex; flex-direction: column; gap: 1rem; }

  .field label {
    display: block;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
    margin-bottom: 0.4rem;
  }

  .field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.8rem 1rem;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus { border-color: var(--accent); }

  .btn {
    width: 100%;
    padding: 0.85rem;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: var(--accent);
    color: #0e0f11;
    transition: all 0.2s;
    margin-top: 0.5rem;
  }

  .btn:hover { background: #d4f470; transform: translateY(-1px); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .error {
    background: rgba(240, 96, 128, 0.15);
    border: 1px solid var(--danger);
    color: var(--danger);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    font-size: 0.8rem;
    display: none;
  }

  .panel { display: none; }
  .panel.active { display: block; }
</style>
</head>
<body>

<div class="container">
  <div class="logo">
    <h1>Pèse-moi</h1>
    <p>suivi de poids personnel</p>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login', this)">Connexion</button>
      <button class="tab" onclick="switchTab('register', this)">Inscription</button>
    </div>

    <div id="error-msg" class="error"></div>

    <!-- CONNEXION -->
    <div id="panel-login" class="panel active">
      <div class="form">
        <div class="field">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="ton@email.com" autocomplete="email">
        </div>
        <div class="field">
          <label>Mot de passe</label>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn" id="btn-login" onclick="login()">Se connecter</button>
      </div>
    </div>

    <!-- INSCRIPTION -->
    <div id="panel-register" class="panel">
      <div class="form">
        <div class="field">
          <label>Pseudo</label>
          <input type="text" id="reg-username" placeholder="tonpseudo" autocomplete="username">
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="ton@email.com" autocomplete="email">
        </div>
        <div class="field">
          <label>Mot de passe</label>
          <input type="password" id="reg-password" placeholder="6 caractères minimum" autocomplete="new-password">
        </div>
        <button class="btn" id="btn-register" onclick="register()">Créer mon compte</button>
      </div>
    </div>
  </div>
</div>

<script>
function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(`panel-${tab}`).classList.add('active');
  hideError();
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('error-msg').style.display = 'none';
}

async function login() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) { showError('Remplis tous les champs'); return; }

  const btn = document.getElementById('btn-login');
  btn.disabled = true;
  btn.textContent = 'Connexion…';
  hideError();

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();
    if (!res.ok) { showError(data.detail); return; }

    // Redirige vers l'app
    window.location.href = '/';
  } catch {
    showError('Erreur de connexion');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Se connecter';
  }
}

async function register() {
  const username = document.getElementById('reg-username').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;

  if (!username || !email || !password) { showError('Remplis tous les champs'); return; }

  const btn = document.getElementById('btn-register');
  btn.disabled = true;
  btn.textContent = 'Création…';
  hideError();

  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, email, password })
    });

    const data = await res.json();
    if (!res.ok) { showError(data.detail); return; }

    window.location.href = '/';
  } catch {
    showError('Erreur lors de la création du compte');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Créer mon compte';
  }
}

// Connexion avec Entrée
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const activePanel = document.querySelector('.panel.active').id;
    if (activePanel === 'panel-login') login();
    else register();
  }
});
</script>
</body>
</html>
