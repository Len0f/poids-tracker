<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pèse-moi</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap");

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0e0f11;
        --surface: #16181c;
        --surface2: #1e2126;
        --border: #2a2d35;
        --accent: #c8f060;
        --accent2: #60c8f0;
        --danger: #f06080;
        --text: #e8e9eb;
        --muted: #6b7280;
        --font-display: "DM Serif Display", serif;
        --font-mono: "DM Mono", monospace;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-mono);
        min-height: 100vh;
        padding: 2rem 1.5rem;
        background-image:
          radial-gradient(ellipse at 20% 0%, #1a2a0a 0%, transparent 50%),
          radial-gradient(ellipse at 80% 100%, #0a1a2a 0%, transparent 50%);
      }

      header {
        display: flex;
        align-items: baseline;
        gap: 1rem;
        margin-bottom: 2.5rem;
        border-bottom: 1px solid var(--border);
        padding-bottom: 1.5rem;
        justify-content: space-between;
      }

      .header-left {
        display: flex;
        align-items: baseline;
        gap: 1rem;
      }

      h1 {
        font-family: var(--font-display);
        font-size: 2.2rem;
        color: var(--accent);
        font-style: italic;
      }

      .subtitle {
        color: var(--muted);
        font-size: 0.7rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
      }

      .api-link {
        font-size: 0.65rem;
        color: var(--muted);
        text-decoration: none;
        border: 1px solid var(--border);
        padding: 0.3rem 0.75rem;
        border-radius: 6px;
        transition: all 0.2s;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
      .api-link:hover {
        color: var(--accent2);
        border-color: var(--accent2);
      }

      .grid {
        display: grid;
        grid-template-columns: 340px 1fr;
        gap: 1.5rem;
        align-items: start;
      }

      @media (max-width: 800px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1.5rem;
      }

      .card-title {
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: var(--muted);
        margin-bottom: 1.25rem;
      }

      .entry-form {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .field label {
        display: block;
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        color: var(--muted);
        margin-bottom: 0.4rem;
      }

      .field input {
        width: 100%;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0.7rem 1rem;
        color: var(--text);
        font-family: var(--font-mono);
        font-size: 0.9rem;
        transition: border-color 0.2s;
        outline: none;
      }

      .field input:focus {
        border-color: var(--accent);
      }

      .big-input {
        font-size: 2rem !important;
        font-family: var(--font-display) !important;
        font-style: italic;
        text-align: center;
        color: var(--accent) !important;
      }

      .btn {
        padding: 0.75rem 1.5rem;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-family: var(--font-mono);
        font-size: 0.75rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        transition: all 0.2s;
      }

      .btn-primary {
        background: var(--accent);
        color: #0e0f11;
        font-weight: 500;
        width: 100%;
      }
      .btn-primary:hover {
        background: #d4f470;
        transform: translateY(-1px);
      }
      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      .stats-strip {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1rem;
        margin-bottom: 1.5rem;
      }

      .stat {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1.25rem;
        text-align: center;
      }

      .stat-label {
        font-size: 0.6rem;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        color: var(--muted);
        margin-bottom: 0.5rem;
      }
      .stat-value {
        font-family: var(--font-display);
        font-style: italic;
        font-size: 1.7rem;
        color: var(--accent);
      }
      .stat-value.neutral {
        color: var(--accent2);
      }
      .stat-value.loss {
        color: var(--accent);
      }
      .stat-value.gain {
        color: var(--danger);
      }
      .stat-sub {
        font-size: 0.65rem;
        color: var(--muted);
        margin-top: 0.25rem;
      }

      .chart-wrap {
        position: relative;
        height: 200px;
        margin-bottom: 1.5rem;
      }
      canvas {
        width: 100% !important;
        height: 100% !important;
      }

      .history-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.8rem;
      }
      .history-table th {
        text-align: left;
        font-size: 0.6rem;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        color: var(--muted);
        padding: 0.5rem 0.75rem;
        border-bottom: 1px solid var(--border);
      }
      .history-table td {
        padding: 0.6rem 0.75rem;
        border-bottom: 1px solid #1e2126;
        vertical-align: middle;
      }
      .history-table tr:hover td {
        background: var(--surface2);
      }

      .diff-pill {
        display: inline-block;
        padding: 0.15rem 0.5rem;
        border-radius: 99px;
        font-size: 0.7rem;
        font-weight: 500;
      }
      .diff-pill.loss {
        background: rgba(200, 240, 96, 0.15);
        color: var(--accent);
      }
      .diff-pill.gain {
        background: rgba(240, 96, 128, 0.15);
        color: var(--danger);
      }
      .diff-pill.none {
        background: var(--surface2);
        color: var(--muted);
      }

      .del-btn {
        background: none;
        border: 1px solid var(--border);
        color: var(--muted);
        border-radius: 6px;
        padding: 0.2rem 0.5rem;
        cursor: pointer;
        font-size: 0.7rem;
        transition: all 0.2s;
      }
      .del-btn:hover {
        border-color: var(--danger);
        color: var(--danger);
      }

      .range-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1.5rem;
        margin-bottom: 1.5rem;
      }
      .range-row {
        display: grid;
        grid-template-columns: 1fr 1fr auto;
        gap: 0.75rem;
        align-items: end;
      }
      .range-result {
        margin-top: 1rem;
        padding: 1rem;
        background: var(--surface2);
        border-radius: 8px;
        text-align: center;
      }
      .range-result span:first-child {
        font-size: 0.7rem;
        font-family: var(--font-mono);
        color: var(--muted);
        display: block;
        margin-bottom: 0.5rem;
        line-height: 1.6;
        white-space: pre-line;
      }
      #range-value {
        font-family: var(--font-display);
        font-style: italic;
        font-size: 1.5rem;
        display: block;
        margin-top: 0.25rem;
      }

      .tabs {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
      }
      .tab {
        padding: 0.5rem 1rem;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: none;
        color: var(--muted);
        font-family: var(--font-mono);
        font-size: 0.7rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.2s;
      }
      .tab.active {
        background: var(--surface2);
        border-color: var(--accent);
        color: var(--accent);
      }

      .empty {
        text-align: center;
        color: var(--muted);
        padding: 2rem;
        font-size: 0.8rem;
      }

      .toast {
        position: fixed;
        bottom: 1.5rem;
        right: 1.5rem;
        padding: 0.75rem 1.25rem;
        border-radius: 8px;
        font-size: 0.8rem;
        font-family: var(--font-mono);
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
        z-index: 100;
      }
      .toast.show {
        opacity: 1;
      }
      .toast.success {
        background: rgba(200, 240, 96, 0.2);
        border: 1px solid var(--accent);
        color: var(--accent);
      }
      .toast.error {
        background: rgba(240, 96, 128, 0.2);
        border: 1px solid var(--danger);
        color: var(--danger);
      }

      .week-section {
        margin-bottom: 1rem;
      }
      .week-header {
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        color: var(--muted);
        padding: 0.5rem 0.75rem;
        background: var(--surface2);
        border-radius: 6px;
        margin-bottom: 0.25rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      input[type="date"] {
        min-width: 0;
        width: 100%;
        font-size: 0.75rem;
        padding: 0.7rem 0.5rem;
      }
      .week-diff {
        font-family: var(--font-display);
        font-style: italic;
        font-size: 1rem;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-left">
        <h1>Pèse-moi</h1>
        <span class="subtitle">suivi de poids personnel</span>
      </div>
      <div style="display: flex; align-items: center; gap: 0.75rem">
        <span
          id="username-display"
          style="
            font-size: 0.7rem;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
          "
        ></span>
        <a href="/docs" target="_blank" class="api-link">API docs ↗</a>
        <button
          onclick="logout()"
          style="
            cursor: pointer;
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: 6px;
            padding: 0.3rem 0.75rem;
            font-family: var(--font-mono);
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: all 0.2s;
          "
          onmouseover="
            this.style.borderColor = 'var(--danger)';
            this.style.color = 'var(--danger)';
          "
          onmouseout="
            this.style.borderColor = 'var(--border)';
            this.style.color = 'var(--muted)';
          "
        >
          Déconnexion
        </button>
      </div>
    </header>

    <div class="stats-strip">
      <div class="stat">
        <div class="stat-label">Dernier poids</div>
        <div class="stat-value neutral" id="stat-last">—</div>
        <div class="stat-sub" id="stat-last-date">aucune entrée</div>
      </div>
      <div class="stat">
        <div class="stat-label">Cette semaine</div>
        <div class="stat-value" id="stat-week">—</div>
        <div class="stat-sub" id="stat-week-sub">ven → ven</div>
      </div>
      <div class="stat">
        <div class="stat-label">Ce mois</div>
        <div class="stat-value" id="stat-month">—</div>
        <div class="stat-sub" id="stat-month-sub">—</div>
      </div>
    </div>

    <div class="grid">
      <div>
        <div class="card" style="margin-bottom: 1rem">
          <div class="card-title">Nouvelle entrée</div>
          <div class="entry-form">
            <div class="field">
              <label>Date</label>
              <input type="date" id="inp-date" />
            </div>
            <div class="field">
              <label>Poids (kg)</label>
              <input
                type="number"
                id="inp-weight"
                step="0.1"
                min="20"
                max="300"
                placeholder="75.0"
                class="big-input"
              />
            </div>
            <div class="field">
              <label>Note (optionnel)</label>
              <input
                type="text"
                id="inp-note"
                placeholder="ex: après sport, matin à jeun…"
              />
            </div>
            <button class="btn btn-primary" id="btn-save" onclick="addEntry()">
              ＋ Enregistrer
            </button>
          </div>
        </div>

        <div class="range-card">
          <div class="card-title">Différence entre deux dates</div>
          <div
            style="
              display: grid;
              grid-template-columns: 1fr 1fr;
              gap: 0.75rem;
              margin-bottom: 0.75rem;
            "
          >
            <div class="field">
              <label>Du</label><input type="date" id="range-from" />
            </div>
            <div class="field">
              <label>Au</label><input type="date" id="range-to" />
            </div>
          </div>
          <button class="btn btn-primary" onclick="calcRange()">
            Calculer la différence →
          </button>
          <div id="range-result" style="display: none" class="range-result">
            <span id="range-label"></span>
            <div id="range-value"></div>
          </div>
        </div>
      </div>

      <div>
        <div class="card" style="margin-bottom: 1rem">
          <div class="card-title">Évolution</div>
          <div class="chart-wrap"><canvas id="chart"></canvas></div>
        </div>

        <div class="card">
          <div class="card-title">Historique</div>
          <div class="tabs">
            <button class="tab active" onclick="switchTab('daily', this)">
              Journalier
            </button>
            <button class="tab" onclick="switchTab('weekly', this)">
              Hebdo
            </button>
            <button class="tab" onclick="switchTab('monthly', this)">
              Mensuel
            </button>
          </div>
          <div id="history-content"></div>
        </div>
      </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
